<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px; background: #000;
}
#loader-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: opacity .6s ease;
  opacity: 0;
}
.spinner {
  position: relative; z-index: 1;
  width: 72px; height: 72px;
  border: 5px solid rgba(255,255,255,.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { position: relative; z-index: 1; font-size: .95rem; color: rgba(255,255,255,.6); letter-spacing: .04em; text-shadow: 0 1px 4px #000; }

#err {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: #000; padding: 2rem; text-align: center;
}
#err p { color: #f87171; font-size: .9rem; max-width: 380px; line-height: 1.5; }

#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="err">
  <p id="err-msg"></p>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline></video>
</div>

<script>
var TMDB_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';

var MESSAGES = [
  'Loading stream...', 'Contacting the mothership...', 'Bribing the servers...',
  'Untangling the cables...', 'Asking nicely...', 'Decoding the matrix...',
  'Warming up the hamsters...', 'Negotiating with the cloud...', 'Almost there...',
  'Convincing pixels to move...', 'Poking the API...', 'Summoning bandwidth...',
  'Greasing the pipes...', 'Waking up the interns...', 'Stealing the stream (legally)...'
];
var msgEl = document.getElementById('loader-text');
var msgIdx = 0;
var msgTimer = setInterval(function() {
  msgIdx = (msgIdx + 1) % MESSAGES.length;
  msgEl.textContent = MESSAGES[msgIdx];
}, 2200);

var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');

function showPlayer() {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player').style.display = 'block';
}
function showErr(msg) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  var el = document.getElementById('err');
  el.style.display = 'flex';
  document.getElementById('err-msg').textContent = msg;
}

function loadBackdrop(id, isTv) {
  var type = isTv ? 'tv' : 'movie';
  fetch('https://api.themoviedb.org/3/' + type + '/' + id + '?api_key=' + TMDB_KEY)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var img = d.backdrop_path || d.poster_path;
      if (!img) return;
      var url = 'https://wsrv.nl/?url=' + encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img) + '&bg=black&blur=3';
      var bg = document.getElementById('loader-bg');
      var preload = new Image();
      preload.onload = function() { bg.style.backgroundImage = 'url(' + url + ')'; bg.style.opacity = '1'; };
      preload.src = url;
    })
    .catch(function() {});
}

if (!id) {
  showErr('Usage: ?id=550 for movies  |  ?id=456&s=1&e=1 for TV');
} else {
  loadBackdrop(id, !!s);
  var api = '/api?' + (s ? 'id='+id+'&s='+s+'&e='+(e||'1') : 'id='+id);
  fetch(api)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) return showErr(d.error);
      play(d.url);
    })
    .catch(function(err) { showErr(err.message); });
}

function play(rawUrl) {
  var src = '/api?url=' + encodeURIComponent(rawUrl);
  var v = document.getElementById('v');
  if (Hls.isSupported()) {
    var hls = new Hls({ enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      showPlayer();
      v.play().catch(function(){});
    });
    hls.on(Hls.Events.ERROR, function(_, d) {
      if (d.fatal) showErr('Playback failed: ' + (d.details || ''));
    });
  } else {
    v.src = src;
    v.addEventListener('canplay', showPlayer, { once: true });
    v.play().catch(function(){});
  }
}
</script>
</body>
</html>
